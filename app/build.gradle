plugins { id 'com.android.application' }
android {
    namespace 'com.xmqn.yxsr'; compileSdk 33
    defaultConfig { applicationId "com.xmqn.yxsr"; minSdk 24
        targetSdk 33; versionCode 3; versionName "1.3.0" }
    buildTypes { release { minifyEnabled false; proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),'proguard-rules.pro' } }
    compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.webkit:webkit:1.10.0'
}